spring.application.name=QuantityMeasurementApp

# Server port - Railway injects PORT env var
server.port=${PORT:8080}

# Repository Type (cache | database)
repository.type=database

# -----------------------------------------------
# DATASOURCE - driven by env vars for Railway
# -----------------------------------------------
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:h2:mem:quantitymeasurementdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:sa}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}
spring.datasource.driver-class-name=${SPRING_DATASOURCE_DRIVER:org.h2.Driver}

# JPA
spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:update}
spring.jpa.show-sql=${JPA_SHOW_SQL:false}
spring.jpa.properties.hibernate.format_sql=false

# Auto-detect dialect
spring.jpa.database-platform=${JPA_DIALECT:}

# H2 console (disabled in prod via env)
spring.h2.console.enabled=${H2_CONSOLE_ENABLED:false}
spring.h2.console.path=/h2-console

# CONNECTION POOL (HikariCP)
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=30000

# LOGGING
logging.level.root=INFO
logging.level.com.app.quantitymeasurement=INFO

# Custom log pattern
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} %logger{5}:%line %msg%n

# SWAGGER / OPENAPI
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.enabled=true

# OAUTH2
spring.security.oauth2.client.registration.google.scope=email,profile
spring.security.oauth2.client.registration.google.redirect-uri=${GOOGLE_REDIRECT_URI:http://localhost:8080/login/oauth2/code/google}
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET}

# JWT
jwt.secret=${JWT_SECRET:ChangeThisToASecureRandomStringAtLeast64CharsLongForHS256Algorithm!!}

# OAuth2 frontend redirect
oauth2.redirect-uri=${OAUTH2_REDIRECT_URI:http://localhost:3000/oauth2/callback}

# ACTUATOR - health check for Railway
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=never
